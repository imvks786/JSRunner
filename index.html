<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JSRunner — Online JavaScript Editor & Compiler</title>

    <!-- SEO Meta -->
    <meta name="description" content="Use JSRunner's powerful online JavaScript editor to write, run, and debug JS code in real time. Features autocomplete, 40+ themes, auto-save, and live output.">
    <meta name="keywords" content="javascript editor online, js runner editor, online js compiler, run javascript browser, javascript playground">
    <meta name="author" content="Vivek Singh">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://imvks786.github.io/JSRunner/Editor.html">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://imvks786.github.io/JSRunner/Editor.html">
    <meta property="og:title" content="JSRunner — Online JavaScript Editor & Compiler">
    <meta property="og:description" content="Write and run JavaScript code instantly in your browser with autocomplete, live output, and 40+ themes.">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Unofficial_JavaScript_logo_2.svg/1200px-Unofficial_JavaScript_logo_2.svg.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="JSRunner — Online JavaScript Editor">
    <meta name="twitter:description" content="Write and run JavaScript instantly in your browser.">
    <meta name="twitter:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Unofficial_JavaScript_logo_2.svg/1200px-Unofficial_JavaScript_logo_2.svg.png">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "JSRunner Editor",
      "url": "https://imvks786.github.io/JSRunner/Editor.html",
      "description": "Online JavaScript editor with live execution, autocomplete, and multiple themes.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Any"
    }
    </script>

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="ico/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="ico/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="ico/favicon-16x16.png">
    <link rel="manifest" href="ico/site.webmanifest">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- ACE Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.35.2/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.35.2/mode-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.35.2/ext-language_tools.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.35.2/src/ext-themelist.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d0d;
            --bg2: #141414;
            --surface: #1a1a1a;
            --surface2: #222;
            --border: rgba(255,255,255,0.07);
            --text: #f0f0f0;
            --muted: #666;
            --accent: #f7df1e;
            --accent2: #66cbb9;
            --danger: #ff5f56;
            --success: #27c93f;
            --output-bg: #0a0a0a;
            --glow: rgba(247,223,30,0.12);
            --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
            --header-h: 56px;
            --toolbar-h: 52px;
        }

        [data-theme="light"] {
            --bg: #f2f2ed;
            --bg2: #e8e8e3;
            --surface: #ffffff;
            --surface2: #f5f5f0;
            --border: rgba(0,0,0,0.08);
            --text: #111;
            --muted: #888;
            --accent: #c49a00;
            --accent2: #2a9d8f;
            --output-bg: #1a1a1a;
            --glow: rgba(196,154,0,0.1);
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            transition: background var(--transition), color var(--transition);
        }

        /* ---- HEADER ---- */
        header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 12px;
        }

        .header-logo {
            font-family: 'Space Mono', monospace;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }
        .header-logo .bracket { color: var(--accent); }

        .header-center {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }

        .file-tab {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .file-tab .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2.5s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

        .icon-btn {
            width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            position: relative;
        }
        .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
        .icon-btn[title]:hover::after {
            content: attr(title);
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 3px 8px;
            font-size: 0.7rem;
            white-space: nowrap;
            pointer-events: none;
            z-index: 99;
            font-family: 'DM Sans', sans-serif;
        }

        .theme-select {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            padding: 6px 10px;
            cursor: pointer;
            outline: none;
            max-width: 130px;
            transition: border-color 0.2s;
        }
        .theme-select:hover { border-color: var(--accent); }

        .run-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 18px;
            background: var(--accent);
            color: #0d0d0d;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .run-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--glow); }
        .run-btn:active { transform: translateY(0); }

        .theme-toggle-btn {
            width: 44px; height: 24px;
            border-radius: 50px;
            background: var(--surface2);
            border: 1px solid var(--border);
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
        }
        .theme-toggle-btn::after {
            content: '';
            position: absolute;
            top: 2px; left: 2px;
            width: 18px; height: 18px;
            background: var(--accent);
            border-radius: 50%;
            transition: transform var(--transition);
        }
        [data-theme="light"] .theme-toggle-btn::after { transform: translateX(20px); }

        /* ---- WORKSPACE ---- */
        .workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* EDITOR PANEL */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            min-width: 0;
        }

        .panel-header {
            height: var(--toolbar-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .panel-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-label .lang-badge {
            background: rgba(247,223,30,0.12);
            color: var(--accent);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 0.68rem;
        }

        #editor {
            flex: 1;
            width: 100%;
            font-size: 14px;
        }
        .ace_editor { font-family: 'Space Mono', monospace !important; }
        .ace_scrollbar-h { overflow: hidden !important; }
        .ace_scrollbar-v::-webkit-scrollbar { width: 6px !important; }
        .ace_scrollbar-v::-webkit-scrollbar-track { background: transparent; }
        .ace_scrollbar-v::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* OUTPUT PANEL */
        .output-panel {
            width: 42%;
            min-width: 240px;
            display: flex;
            flex-direction: column;
        }

        .output-body {
            flex: 1;
            background: var(--output-bg);
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.7;
            padding: 16px 20px;
            overflow-y: auto;
            color: #c8c8c8;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .output-body::-webkit-scrollbar { width: 5px; }
        .output-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

        .output-placeholder {
            color: var(--muted);
            font-size: 0.78rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 8px;
            opacity: 0.5;
        }
        .output-placeholder .ico { font-size: 2rem; }

        .error_ { color: var(--danger); background: rgba(255,95,86,0.08); padding: 2px 6px; border-radius: 4px; }

        /* RESIZE HANDLE */
        .resize-handle {
            width: 4px;
            background: transparent;
            cursor: col-resize;
            flex-shrink: 0;
            transition: background 0.2s;
            position: relative;
        }
        .resize-handle:hover { background: var(--accent); }

        /* NOTIFICATION */
        .toast {
            position: fixed;
            right: 20px;
            bottom: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--success);
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            z-index: 999;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
            pointer-events: none;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-left-color: var(--danger); }
        .toast .t-icon { font-size: 1rem; }

        /* AUTO-SAVE INDICATOR */
        .autosave-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--muted);
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .autosave-dot.saving { background: var(--accent); animation: pulse 1s 3; }
        .autosave-dot.saved { background: var(--success); }

        /* MOBILE */
        @media (max-width: 768px) {
            .workspace { flex-direction: column; }
            .editor-panel { border-right: none; border-bottom: 1px solid var(--border); }
            .output-panel { width: 100%; min-height: 220px; }
            .resize-handle { display: none; }
            .header-center { display: none; }
            .header-logo { font-size: 0.85rem; }
            .theme-select { display: none; }
            .run-btn span { display: none; }
            .run-btn { padding: 7px 14px; }
        }

        @media (max-width: 480px) {
            header { padding: 0 12px; gap: 8px; }
            .icon-btn { width: 30px; height: 30px; }
        }

        /* PRELOADER */
        #preloader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: opacity 0.5s ease;
        }
        .preloader-logo {
            font-family: 'Space Mono', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            animation: pulse 1s infinite;
        }
        .preloader-logo .bracket { color: var(--accent); }
        .preloader-bar {
            width: 120px; height: 2px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .preloader-bar::after {
            content: '';
            display: block;
            height: 100%;
            background: var(--accent);
            animation: load 1.2s ease forwards;
        }
        @keyframes load { from {width:0} to {width:100%} }
    </style>
</head>
<body>

<!-- PRELOADER -->
<div id="preloader" role="status" aria-label="Loading editor">
    <div class="preloader-logo"><span class="bracket">{</span> JS <span class="bracket">}</span></div>
    <div class="preloader-bar"></div>
</div>

<!-- HEADER -->
<header role="banner">
    <a href="index.html" class="header-logo" aria-label="Back to JSRunner home">
        <span class="bracket">{</span>&nbsp;JS&nbsp;<span class="bracket">}</span>
    </a>

    <div class="header-center">
        <div class="file-tab">
            <div class="status-dot" id="autosaveDot" title="Auto-save status"></div>
            <span>script.js</span>
        </div>
    </div>

    <div class="header-actions">
        <select class="theme-select" id="themes" title="Change editor theme" aria-label="Editor theme selector">
            <option value="">Theme</option>
        </select>
        <button class="icon-btn" id="copyBtn" title="Copy code" aria-label="Copy code to clipboard">⎘</button>
        <button class="icon-btn" id="clearBtn" title="Clear code" aria-label="Clear all code">🗑</button>
        <button class="icon-btn" id="saveBtn" title="Save (Ctrl+S)" aria-label="Save code">💾</button>
        <button class="theme-toggle-btn" id="themeToggle" aria-label="Toggle dark/light mode" title="Toggle theme"></button>
        <button class="run-btn" id="runBtn" aria-label="Run code">▶ <span>Run</span></button>
    </div>
</header>

<!-- WORKSPACE -->
<main class="workspace" role="main" aria-label="Code editor workspace">
    <!-- EDITOR -->
    <div class="editor-panel">
        <div class="panel-header">
            <div class="panel-label">
                Editor
                <span class="lang-badge">JavaScript</span>
            </div>
        </div>
        <div id="editor" aria-label="JavaScript code editor" role="textbox" aria-multiline="true">// Write JavaScript below — output appears live
function greet(name) {
    console.log("Hello, " + name + "!");
}

greet("World");
</div>
    </div>

    <div class="resize-handle" id="resizeHandle" role="separator" aria-label="Drag to resize panels"></div>

    <!-- OUTPUT -->
    <div class="output-panel">
        <div class="panel-header">
            <div class="panel-label">Console Output</div>
            <button class="icon-btn" id="clearOutputBtn" title="Clear output" aria-label="Clear console output" style="width:28px;height:28px;font-size:0.75rem;">✕</button>
        </div>
        <div class="output-body" id="output" aria-live="polite" aria-label="Console output">
            <div class="output-placeholder">
                <div class="ico">⬜</div>
                <div>Output will appear here</div>
            </div>
        </div>
    </div>
</main>

<!-- TOAST -->
<div class="toast" id="toast" role="alert" aria-live="assertive">
    <span class="t-icon">✓</span>
    <span id="toastMsg"></span>
</div>

<script>
    // ----- THEME -----
    const root = document.documentElement;
    const saved = localStorage.getItem('jsrunner-theme') || 'dark';
    root.setAttribute('data-theme', saved);

    document.getElementById('themeToggle').addEventListener('click', () => {
        const t = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', t);
        localStorage.setItem('jsrunner-theme', t);
        if (editor) {
            editor.setTheme(localStorage.getItem('JS_C_THEME') || 'ace/theme/monokai');
        }
    });

    // ----- TOAST -----
    function showToast(msg, isError = false) {
        const el = document.getElementById('toast');
        el.querySelector('#toastMsg').textContent = msg;
        el.querySelector('.t-icon').textContent = isError ? '✕' : '✓';
        el.classList.toggle('error', isError);
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3200);
    }

    // ----- CODE RUNNER -----
    function runCode(code) {
        const out = document.getElementById('output');
        out.innerHTML = '';
        if (!code.trim()) {
            out.innerHTML = '<div class="output-placeholder"><div class="ico">⬜</div><div>Output will appear here</div></div>';
            return;
        }
        try {
            const captured = [];
            const origLog = console.log;
            console.log = (...args) => {
                captured.push(args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
                origLog.apply(console, args);
            };
            new Function(code)();
            console.log = origLog;

            if (captured.length) {
                captured.forEach(line => {
                    const div = document.createElement('div');
                    div.textContent = line;
                    div.style.borderBottom = '1px solid rgba(255,255,255,0.03)';
                    div.style.padding = '2px 0';
                    out.appendChild(div);
                });
            } else {
                out.innerHTML = '<div style="color:var(--muted);font-size:0.78rem;">✓ Ran successfully — no console output</div>';
            }
            out.scrollTop = out.scrollHeight;
        } catch (err) {
            out.innerHTML = `<span class="error_">✕ Error: ${err.message}</span>`;
        }
    }

    // ----- EDITOR -----
    let editor;
    let jsData = '';

    window.addEventListener('load', () => {
        // Hide preloader
        const preloader = document.getElementById('preloader');
        preloader.style.opacity = '0';
        setTimeout(() => preloader.style.display = 'none', 500);

        // Init Ace
        editor = ace.edit('editor');
        const savedTheme = localStorage.getItem('JS_C_THEME') || 'ace/theme/monokai';
        editor.setTheme(savedTheme);
        editor.session.setMode('ace/mode/javascript');
        editor.setOptions({
            enableBasicAutocompletion: true,
            enableSnippets: true,
            enableLiveAutocompletion: true,
            fontSize: '14px',
            showPrintMargin: false,
            fontFamily: "'Space Mono', monospace",
            tabSize: 2,
            useSoftTabs: true,
        });
        editor.renderer.setScrollMargin(12, 12);

        // Load saved code
        try {
            jsData = localStorage.getItem('JS_DATA') || `// Write JavaScript below — output appears live\nfunction greet(name) {\n    console.log("Hello, " + name + "!");\n}\n\ngreet("World");`;
        } catch { jsData = `// Write JavaScript below`; }

        editor.session.setValue(jsData);
        editor.focus();
        runCode(jsData);

        // Themes
        const themes = ace.require('ace/ext/themelist').themes;
        const sel = document.getElementById('themes');
        themes.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.theme;
            opt.textContent = t.caption;
            if (t.theme === savedTheme) opt.selected = true;
            sel.appendChild(opt);
        });

        // Live run on change
        editor.session.on('change', () => {
            jsData = editor.getValue();
            runCode(jsData);
        });
    });

    // ----- CONTROLS -----
    document.getElementById('themes').addEventListener('change', function () {
        editor.setTheme(this.value);
        try { localStorage.setItem('JS_C_THEME', this.value); } catch {}
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
        try { localStorage.setItem('JS_DATA', jsData); showToast('Code saved!'); } catch { showToast('Save failed', true); }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
        if (confirm('Clear all code?')) {
            editor.session.setValue('');
            localStorage.removeItem('JS_DATA');
            showToast('Code cleared');
        }
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(jsData)
            .then(() => showToast('Copied to clipboard!'))
            .catch(() => showToast('Copy failed', true));
    });

    document.getElementById('runBtn').addEventListener('click', () => { runCode(jsData); });

    document.getElementById('clearOutputBtn').addEventListener('click', () => {
        document.getElementById('output').innerHTML = '<div class="output-placeholder"><div class="ico">⬜</div><div>Output will appear here</div></div>';
    });

    // Ctrl+S save
    document.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            try { localStorage.setItem('JS_DATA', jsData); showToast('Code saved!'); } catch {}
        }
    });

    // ----- AUTO SAVE -----
    const dot = document.getElementById('autosaveDot');
    setInterval(() => {
        try {
            localStorage.setItem('JS_DATA', jsData);
            dot.className = 'status-dot saving';
            setTimeout(() => { dot.className = 'status-dot saved'; }, 1800);
            setTimeout(() => { dot.className = 'status-dot'; }, 3600);
        } catch {}
    }, 45000);

    // ----- RESIZE HANDLE -----
    const handle = document.getElementById('resizeHandle');
    const workspace = document.querySelector('.workspace');
    let isResizing = false;

    handle.addEventListener('mousedown', e => {
        isResizing = true;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', e => {
        if (!isResizing) return;
        const rect = workspace.getBoundingClientRect();
        const offset = e.clientX - rect.left;
        const total = rect.width;
        const pct = (offset / total) * 100;
        if (pct > 25 && pct < 75) {
            document.querySelector('.editor-panel').style.flex = 'none';
            document.querySelector('.editor-panel').style.width = pct + '%';
            document.querySelector('.output-panel').style.width = (100 - pct - 0.3) + '%';
        }
    });

    document.addEventListener('mouseup', () => {
        isResizing = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });
</script>
</body>
</html>
